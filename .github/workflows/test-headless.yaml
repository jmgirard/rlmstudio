name: Headless Integration Tests

on: [push, pull_request]

jobs:
  test-headless:
    runs-on: ubuntu-latest
    container: rocker/r2u:noble

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y curl r-cran-devtools r-cran-processx r-cran-cli r-cran-httr2

      - name: Run Tests
        shell: Rscript {0}
        env:
          RLMSTUDIO_TEST_HEADLESS: "true"
          RLMSTUDIO_ALLOW_INSTALL: "TRUE"
        run: |
          # This triggers the setup-headless.R logic and runs all tests
          devtools::test()
