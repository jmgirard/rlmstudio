url: https://jmgirard.github.io/rlmstudio/

authors:
  Jeffrey Girard:
    href: https://affcom.ku.edu/girard

template:
  bootstrap: 5
  bslib:
    bootswatch: sandstone
    primary: "#4139C3"
    link-color: "#4139C3"

navbar:
  bg: primary

development:
  mode: dev

repo:
  url:
    home: https://github.com/jmgirard/rlmstudio/
    source: https://github.com/jmgirard/rlmstudio/blob/HEAD/
    issue: https://github.com/jmgirard/rlmstudio/issues/
    user: https://github.com/jmgirard/

reference:
  - title: "Chat & Inference"
    desc: "Interact with loaded LLMs to generate text and process batches of prompts."
    contents:
      - lms_chat
      - lms_chat_batch
      - lms_chat_native
      - lms_chat_openai
      - lms_chat_openresponses
      - lms_score_expected

  - title: "Model Management"
    desc: "Discover, download, load, and manage local models."
    contents:
      - list_models
      - lms_download
      - lms_download_status
      - lms_load
      - lms_unload
      - lms_unload_all

  - title: "Local Server Management"
    desc: "Control the LM Studio local REST API server."
    contents:
      - lms_server_start
      - lms_server_stop
      - lms_server_status

  - title: "Headless Daemon Management"
    desc: "Manage the background `llmster` daemon required for headless environments (e.g., remote servers, Docker)."
    contents:
      - lms_daemon_start
      - lms_daemon_stop
      - lms_daemon_status
      - with_lms_daemon

  - title: "Setup & Configuration"
    desc: "Install, locate, and verify the LM Studio CLI installation."
    contents:
      - install_lmstudio
      - has_lms
      - check_lms_version
      - lms_path
